services:

  db:
    profiles: ["docker-db"]   # not started by default; use: docker compose --profile docker-db up
    build:
      context: .
      dockerfile: docker/Dockerfile.db
    container_name: tt-db
    environment:
      POSTGRES_DB: ttdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ttdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: tt-martin
    command: ["-c", "/config/martin-config.yaml"]
    environment:
      # Points to the native WSL2 PostgreSQL instance on the host.
      # host.docker.internal resolves to the Docker bridge gateway via extra_hosts below.
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-devpassword}@host.docker.internal:5432/ttdb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/martin-config.yaml:/config/martin-config.yaml:ro
    networks:
      - internal
    # NO ports mapping — Martin is internal only.
    # docker-compose.override.yml exposes a localhost-only port for local dev.
    # In production (AKS) this service is ClusterIP — never LoadBalancer or NodePort.

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
